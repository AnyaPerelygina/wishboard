<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Wishboard - подарки для себя.">
    <title>Wishboard</title>
    <link rel="stylesheet" href="css/style.min.css">
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <div class="container">
          <div class="header__wrapper">
            <a class="header__logo" href="index.html"></a>
            <button class="visually-hidden" data-open-modal="forms">Войти</button>
          </div>
        </div>
      </header>
      <main>
        <h1 class="visually-hidden">Wishboard - сайт с подарками для себя.</h1>
        <section clsss="hero">
          <div class="hero__slider swiper hero__swiper">
            <ul class="hero__list swiper-wrapper">
              <li class="hero__item swiper-slide" tabindex="0">
                <div class="hero__pagination visually-hidden"></div>
                <picture></picture>
              </li>
              <li class="hero__item swiper-slide" tabindex="0">
                <div class="hero__pagination visually-hidden"></div>
                <picture></picture>
              </li>
              <li class="hero__item swiper-slide" tabindex="0">
                <div class="hero__pagination visually-hidden"></div>
                <picture></picture>
              </li>
            </ul>
          </div>
          <button class="hero__button btn">Составь свой лист желаний</button>
        </section>
      </main>
      <footer>
        <div class="container">
          <div class="footer__wrapper">
            <a class="footer__logo" href="index.html"></a>
            <nav class="footer__nav nav">
              <ul class="nav__list">
                <li class="nav__item">
                  <a class="nav__link" href="#">О нас</a>
                </li>
                <li class="nav__item">
                  <a class="nav__link" href="#">Условия пользования</a>
                </li>
                <li class="nav__item">
                  <a class="nav__link" href="#">Политика конфиденциальности</a>
                </li>
                <li class="nav__item">
                  <a class="nav__link" href="#">Популярные вопросы</a>
                </li>
                <li class="nav__item">
                  <a class="nav__link" href="#">Напишите нам</a>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </footer>
    </div>
    <script src="js/vendor.min.js"></script>
    <script src="js/main.min.js"></script>
  </body>
</html>
